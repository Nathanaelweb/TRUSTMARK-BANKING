<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trustmark Bank</title>
  
</head>
<body>
<style>:root {
  /* Purple & White Theme Variables */
  --primary-color: #6d28d9;    /* Deep Purple */
  --primary-hover: #5b21b6;    /* Darker Purple */
  --bg-color: #f9fafb;         /* Light White/Grey background */
  --card-bg: #ffffff;          /* Pure White Form */
  --text-main: #111827;        /* Dark Grey/Black text */
  --text-muted: #6b7280;       /* Muted Grey text */
  --border-color: #e5e7eb;     /* Soft border */
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background-color: var(--bg-color);
  margin: 0;
  /* Centering Logic */
 display: grid;
  justify-content: center; 
  align-items: center;     
  min-height: 100vh;       
  color: var(--text-main);
}

.auth-container {
  width: 100%;
  max-width: 420px; /* desktop size */
}

.form-box {
  background: var(--card-bg);
  padding: 40px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05), 0 4px 10px rgba(109, 40, 217, 0.05);
  border: 1px solid var(--border-color);
}

/* Form Visibility Management */
.form {
  display: none;
  flex-direction: column;
}

.form.active {
  display: flex;
  animation: fadeIn 0.4s ease-out;
}

h2 {
  margin-top: 0;
  font-size: 1.5rem;
  text-align: center;
  margin-bottom: 28px;
  color: var(--primary-color);
  font-weight: 700;
  line-height: 1.2;
}

input {
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 18px;
  border: 1px solid var(--border-color);
  border-radius: 10px;
  font-size: 16px; 
  box-sizing: border-box;
  transition: all 0.2s ease;
  background-color: #ffffff;
}

input:focus {
  outline: none;
  border-color: var(--primary-color);
  box-shadow: 0 0 0 4px rgba(109, 40, 217, 0.1);
}

button {
  width: 100%;
  padding: 14px;
  background-color: var(--primary-color);
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  font-size: 16px;
  cursor: pointer;
  transition: background 0.3s ease;
  margin-bottom: 12px;
}

button:hover {
  background-color: var(--primary-hover);
}

/* Google Button Specifics */
button[onclick="googleLogin()"] {
  background-color: #ffffff;
  color: #374151;
  border: 1px solid var(--border-color);
  margin-top: 10px;
}

button[onclick="googleLogin()"]:hover {
  background-color: #f9fafb;
  border-color: var(--primary-color);
}

.divider {
  text-align: center;
  margin: 20px 0;
  position: relative;
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 500;
}

.divider::before, .divider::after {
  content: "";
  position: absolute;
  top: 50%;
  width: 40%;
  height: 1px;
  background-color: var(--border-color);
}

.divider::before { left: 0; }
.divider::after { right: 0; }

.link {
  text-align: right;
  font-size: 14px;
  color: var(--primary-color);
  cursor: pointer;
  margin-bottom: 20px;
  display: block;
  font-weight: 500;
}

.toggle {
  text-align: center;
  font-size: 14px;
  color: var(--text-muted);
  margin-top: 24px;
}

.toggle a {
  color: var(--primary-color);
  text-decoration: none;
  font-weight: 600;
  cursor: pointer;
}

.checkbox {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  margin-bottom: 20px;
  color: var(--text-muted);
  cursor: pointer;
}

.checkbox input {
  width: 18px;
  height: 18px;
  margin-bottom: 0;
  accent-color: var(--primary-color);
}

/* Smooth Fade-in Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 768px) {
  body {
    display: block; /* remove centering */
  }

  .auth-container {
    max-width: 100%;
  }

  .form-box {
    border-radius: 0;
    min-height: 100vh;
    box-shadow: none;
  }
}
</style>
<div class="auth-container">
  <div class="form-box">

    <!-- LOGIN -->
    <form id="loginForm" class="form active">
      <h2>Welcome Back Login to Trustmark Bank Account</h2>

      <input type="email" id="loginEmail" placeholder="Email" required>
      <input type="password" id="loginPassword" placeholder="Password" required>

      <button type="submit">Sign In</button>

      <span class="link" onclick="resetPassword()">Forgot password?</span>

      <div class="divider">OR</div>

      <button type="button" onclick="googleLogin()">Sign in with Google</button>

      <p class="toggle">
        Don’t have an account?
        <a href="javascript:void(0)" onclick="window.showSignup()">Create Account</a> |
        <a href="javascript:void(0)" onclick="window.showAdmin()">Admin Login</a>
      </p>

    </form>

    <!-- SIGN UP -->
    <form id="signupForm" class="form">
      <h2>Create Account with Trustmark Bank </h2>

      <input type="text" id="firstName" placeholder="First Name" required>
      <input type="text" id="lastName" placeholder="Last Name" required>
      <input type="email" id="signupEmail" placeholder="Email" required>
      <input type="tel" id="phone" placeholder="+1 213 218 5486" required>

      <input type="password" id="signupPassword" placeholder="Password" required>
      <input type="password" id="confirmPassword" placeholder="Confirm Password" required>

      <!-- PIN removed -->

      <label class="checkbox">
        <input type="checkbox" id="terms" required>
        I agree to the terms and conditions
      </label>

      <button type="submit">Create Account</button>

      <p class="toggle">
        Already have an account.
        <a href="javascript:void(0)" onclick="window.showLogin()">Login to your Account</a>
      </p>
    </form>

    <!-- ADMIN LOGIN -->
    <form id="adminForm" class="form">
      <h2>Admin Secure Login</h2>

      <input type="email" id="adminEmail" placeholder="Admin Email" required>
      <input type="password" id="adminPassword" placeholder="Admin Password" required>

      <button type="submit">Admin Sign In</button>

      <p class="toggle">
        Not an admin?
        <a onclick="showLogin()">User Login</a>
      </p>
    </form>

  </div>
</div>

<script type="module">
/* ================= FIREBASE IMPORTS ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  sendPasswordResetEmail,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyB_ssiJh411JD3uX6SXwBTT3wIT5nZ6iOk",
  authDomain: "truemark-bank.firebaseapp.com",
  projectId: "truemark-bank",
  storageBucket: "truemark-bank.firebasestorage.app",
  messagingSenderId: "135459481471",
  appId: "1:135459481471:web:21b487301aaac729eddc4a",
  measurementId: "G-S2EHW9XHWJ"
};

/* 🔥 INIT */
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================= DOM ELEMENTS ================= */
const signupForm = document.getElementById("signupForm");
const loginForm = document.getElementById("loginForm");
const adminForm = document.getElementById("adminForm");

const firstName = document.getElementById("firstName");
const lastName = document.getElementById("lastName");
const signupEmail = document.getElementById("signupEmail");
const phone = document.getElementById("phone");
const signupPassword = document.getElementById("signupPassword");
const confirmPassword = document.getElementById("confirmPassword");
const pinMessage = document.getElementById("pinMessage");
const pinInput = document.getElementById("pin");

const loginEmail = document.getElementById("loginEmail");
const loginPassword = document.getElementById("loginPassword");

const adminEmail = document.getElementById("adminEmail");
const adminPassword = document.getElementById("adminPassword");

const ADMIN_UID = "LgUzwFasaCPfhFf2jISVWVhfqKr2";

/* ================= TOGGLE FORMS ================= */
// Attach toggle functions to window so HTML inline onclick works
window.showSignup = () => {
  loginForm.classList.remove("active");
  adminForm?.classList.remove("active");
  signupForm.classList.add("active");
};

window.showLogin = () => {
  signupForm.classList.remove("active");
  adminForm?.classList.remove("active");
  loginForm.classList.add("active");
};

window.showAdmin = () => {
  signupForm.classList.remove("active");
  loginForm.classList.remove("active");
  adminForm.classList.add("active");
};

/* ================= PIN GENERATOR ================= */
function generatePin() {
  return Math.floor(100000 + Math.random() * 900000).toString();
}

/* ================= SIGN UP ================= */
signupForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  if (signupPassword.value !== confirmPassword.value) {
    alert("Passwords do not match");
    return;
  }

  try {
    // 1️⃣ Create auth account
    const userCred = await createUserWithEmailAndPassword(
      auth,
      signupEmail.value,
      signupPassword.value
    );

    // 2️⃣ Generate account & balances
    const accountNumber = "AC" + Math.floor(10000000 + Math.random() * 90000000);
    const savingsNumber = "SV" + Math.floor(10000000 + Math.random() * 90000000);
    
    // 3️⃣ Save user data in Firestore
    await setDoc(doc(db, "users", userCred.user.uid), {
      firstName: firstName.value,
      lastName: lastName.value,
      email: signupEmail.value,
      phone: phone.value,
      name: firstName.value + " " + lastName.value,
      accountNumber,
      savingsNumber,
      balances: { current: 0, savings: 0, loan: 0 },
      createdAt: new Date()
    });

    alert("Account created successfully 🎉");
    window.location.href = "dashboard.html";

  } catch (err) {
    console.error(err);
    alert(err.message);
  }
});



/* ================= LOGIN ================= */
loginForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  try {
    await signInWithEmailAndPassword(
      auth,
      loginEmail.value,
      loginPassword.value
    );

    window.location.href = "dashboard.html";

  } catch (error) {
    alert(error.message);
  }
});

/* ================= PASSWORD RESET ================= */
window.resetPassword = async () => {
  if (!loginEmail.value) {
    alert("Enter your email first");
    return;
  }
  await sendPasswordResetEmail(auth, loginEmail.value);
  alert("Password reset email sent 📩");
};

/* ================= GOOGLE LOGIN ================= */
window.googleLogin = async () => {
  try {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
    alert("Signed in with Google ✅");
  } catch (error) {
    alert(error.message);
  }
};

/* ================= ADMIN LOGIN ================= */
adminForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  try {
    const cred = await signInWithEmailAndPassword(
      auth,
      adminEmail.value,
      adminPassword.value
    );

    if (cred.user.uid !== ADMIN_UID) {
      alert("Unauthorized admin access ❌");
      return;
    }

    window.location.href = "admin.html";

  } catch (error) {
    alert(error.message);
  }
});

console.log("🔥 Firebase fully connected");
</script>
